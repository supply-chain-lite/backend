name: Supply Chain Lite - Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Copy app to VPS
        uses: burnett01/rsync-deployments@17e355a20fdb63db23eaa29d8e3b9ca4f18a0f4a # v8
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' --exclude='data/'
          path: ./
          remote_path: ${{ secrets.VPS_DEPLOY_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: 22

      - name: Restart service
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            uv sync --frozen
            sudo systemctl restart new_scl_app.service
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}