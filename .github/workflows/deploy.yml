name: Supply Chain Lite - Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest

    outputs:
      app_changed: ${{ steps.filter.outputs.app }}
      celery_changed: ${{ steps.filter.outputs.celery }}
      scheduler_changed: ${{ steps.filter.outputs.scheduler }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
            persist-credentials: false

      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            app:
              - 'app/**'

            celery:
              - 'celery/**'

            scheduler:
              - 'scheduler/**'

  deploy:
    runs-on: ubuntu-latest
    needs: detect-changes
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Copy app to VPS
        uses: burnett01/rsync-deployments@17e355a20fdb63db23eaa29d8e3b9ca4f18a0f4a # v8
        with:
          switches: -avz --delete --exclude='.git' --exclude='.github' --exclude='.venv' --exclude='__pycache__' --exclude='*.pyc' --exclude='.env' --exclude='gunicorn.conf.py' --exclude='data/'
          path: ./
          remote_path: ${{ secrets.VPS_DEPLOY_PATH }}
          remote_host: ${{ secrets.VPS_HOST }}
          remote_user: ${{ secrets.VPS_USER }}
          remote_key: ${{ secrets.VPS_SSH_KEY }}
          remote_port: 22

      - name: UV Sync
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            $HOME/.local/bin/uv sync --frozen
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}

      - name: Restart scheduler service
        if: needs.detect-changes.outputs.scheduler_changed == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: sudo systemctl restart new_scl_scheduler.service

      - name: Wait 2 seconds
        if: needs.detect-changes.outputs.scheduler_changed == 'true'
        run: sleep 2

      - name: Restart app service
        if: needs.detect-changes.outputs.app_changed == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: sudo systemctl restart new_scl_app.service

      - name: Wait 2 seconds
        if: needs.detect-changes.outputs.app_changed == 'true'
        run: sleep 2

      - name: Restart celery service
        if: needs.detect-changes.outputs.celery_changed == 'true'
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: sudo systemctl restart new_scl_celery.service